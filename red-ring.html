<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anillo Rojo</title>
  <style>
    body {
      text-align: center;
      min-height: 100vh;
      background: #1a1a1a;
      overflow: hidden;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg {
      max-height: 95vh;
      stroke: #e53935;
      stroke-linecap: round;
      fill: none;
      stroke-width: 40px;
    }
    svg path {
      stroke: #ff5252;
      animation: animate 4s linear infinite;
    }
    @keyframes animate {
      from {
        stroke-dashoffset: 100px;
      }
      to {
        stroke-dashoffset: 0px;
      }
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 910 820">
    <path transform="translate(22 24)" pathLength="100" d="M 433 0 A 440 440 90 0 0 866 750 A 440 440 90 0 0 0 750 A 440 440 90 0 0 433 0 Z" stroke-dasharray="40 60" stroke-dashoffset="100" />
  </svg>
</body>
</html>
